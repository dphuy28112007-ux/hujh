<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Language Buddy</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#343541;
color:#fff;
display:flex;
flex-direction:column;
height:100vh;
}
header{
padding:15px;
text-align:center;
background:#202123;
font-weight:bold;
}
#chat{
flex:1;
overflow:auto;
padding:15px;
}
.msg{
max-width:800px;
margin:auto;
padding:15px;
margin-bottom:10px;
border-radius:10px;
line-height:1.6;
}
.user{background:#444654;}
.bot{background:#3a3b45;}

#inputArea{
display:flex;
padding:15px;
background:#40414f;
}
input{
flex:1;
padding:12px;
border-radius:8px;
border:none;
outline:none;
}
button{
margin-left:8px;
padding:10px 15px;
border:none;
border-radius:8px;
background:#10a37f;
color:#fff;
cursor:pointer;
}
button:hover{background:#0e8f6f;}

.loading{
display:flex;
gap:5px;
}
.dot{
width:6px;height:6px;
background:#aaa;
border-radius:50%;
animation:blink 1.4s infinite;
}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes blink{
0%,80%,100%{opacity:0}
40%{opacity:1}
}
</style>
</head>

<body>

<header>🤖 AI Language Buddy</header>

<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="Type in English..." />
<button onclick="send()">Send</button>
<button onclick="voice()">🎤</button>
</div>

<script>

// ===== MEMORY =====
let memory = [];

// ===== 400 RESPONSES =====
const responses = [];

const base = [
"Tell me more about that.",
"That sounds interesting!",
"Why do you think so?",
"Can you explain more clearly?",
"I understand 😊",
"What happened next?",
"Why is that important to you?",
"Nice! Keep going!",
"Can you give an example?",
"That's cool!",
"Let's practice more English!",
"Try to make a longer sentence.",
"Good job 👍",
"Keep improving!",
"You're doing well!",
"What do you usually do?",
"How was your day?",
"What is your opinion?",
"Tell me your story.",
"Can you describe it?",
"I like your idea!",
"That's a great point!",
"Very interesting!",
"Can you say it differently?",
"Try using another tense.",
"Ask me a question now.",
"Let's continue the conversation.",
"Don't worry, just try again!",
"You are improving every time!",
"Keep practicing daily!"
];

// tạo 400 câu
for(let i=0;i<400;i++){
responses.push(base[i % base.length] + " (" + (i+1) + ")");
}

// ===== GRAMMAR FIX =====
function fix(text){

if(text.includes("i go yesterday")) return "👉 Correction: I went yesterday";
if(text.includes("she don't")) return "👉 Correction: She doesn't";
if(text.includes("he don't")) return "👉 Correction: He doesn't";
if(text.includes("i very like")) return "👉 Correction: I really like";
if(text.includes("i want go")) return "👉 Correction: I want to go";

if(text.includes("i am go")) return "👉 Correction: I am going";
if(text.includes("i am eat")) return "👉 Correction: I am eating";

if(text.includes("two book")) return "👉 Correction: two books";

if(text.includes("i is")) return "👉 Correction: I am";
if(text.includes("they is")) return "👉 Correction: They are";

if(text.includes("i eat yesterday")) return "👉 Correction: I ate yesterday";

if(text.length < 5) return "👉 Try to write a longer sentence";

return null;
}

// ===== AI =====
function ai(text){
let t = text.toLowerCase();
memory.push(t);

// sửa lỗi
let f = fix(t);
if(f) return f + "\n👉 Try again!";

// hội thoại tự nhiên
if(t.includes("hello") || t.includes("hi") || t.includes("hey"))
return random([
"Hi 👋 How are you today?",
"Hello 😄 What’s up?",
"Hey! How’s it going?"
]);

if(t.includes("i'm fine") || t.includes("i am fine"))
return random([
"Nice to hear that! What did you do today?",
"Great 😊 Tell me more about your day!",
"Good! Anything interesting happened?"
]);

if(t.includes("i am tired"))
return random([
"Why are you tired?",
"Did you work or study a lot?",
"Maybe you need some rest 😄"
]);

if(t.includes("i am happy"))
return random([
"That's great! What made you happy?",
"I’m glad to hear that 😊",
"Tell me what happened!"
]);

if(t.includes("i am sad"))
return random([
"I'm sorry to hear that 😢",
"Do you want to talk about it?",
"What happened?"
]);

if(t.includes("because"))
return random([
"That makes sense!",
"Good reason 👍 Tell me more.",
"I understand. Can you explain more?"
]);

if(t.includes("i like"))
return random([
"Nice! Why do you like it?",
"That’s interesting 😄",
"Tell me more about it!"
]);

if(t.includes("i don't like") || t.includes("i dont like"))
return random([
"Why don’t you like it?",
"That’s okay 😄 Everyone has different tastes.",
"Can you explain why?"
]);

if(t.includes("what") || t.includes("why") || t.includes("how"))
return random([
"Good question!",
"Let me think 🤔",
"Interesting question!"
]);

if(t.includes("yes"))
return random([
"Great!",
"Nice 👍",
"Okay, tell me more!"
]);

if(t.includes("no"))
return random([
"That's okay.",
"Why not?",
"Can you explain?"
]);

if(t.includes("thank"))
return random([
"You're welcome 😊",
"No problem!",
"Glad I can help!"
]);

if(t.includes("bye"))
return random([
"Goodbye 👋",
"See you later!",
"Have a great day!"
]);

if(t.includes("my name is"))
return random([
"Nice to meet you!",
"That’s a great name 😄",
"Hello! Nice meeting you."
]);

if(t.includes("i am learning english"))
return random([
"That’s great! Keep practicing!",
"Nice 👍 Practice every day!",
"You will improve quickly!"
]);

if(t.includes("i want"))
return random([
"That’s a good goal!",
"How will you do it?",
"Tell me your plan!"
]);

if(t.includes("i think"))
return random([
"Interesting opinion!",
"Why do you think so?",
"Can you explain more?"
]);

if(t.includes("today"))
return random([
"What did you do today?",
"Was it a good day?",
"Tell me more about today."
]);

if(t.includes("yesterday"))
return random([
"What did you do yesterday?",
"Was it interesting?",
"Tell me more!"
]);

if(t.includes("tomorrow"))
return random([
"What will you do tomorrow?",
"Any plans?",
"Sounds exciting!"
]);

if(t.includes("friend"))
return random([
"Tell me about your friend.",
"How did you meet?",
"What do you do together?"
]);

if(t.includes("school"))
return random([
"How is your school?",
"What subject do you like?",
"Tell me about your class."
]);

if(t.includes("teacher"))
return random([
"Do you like your teacher?",
"What does your teacher do?",
"Tell me more!"
]);

if(t.includes("food"))
return random([
"What food do you like?",
"Do you like cooking?",
"Tell me your favorite dish!"
]);

if(t.includes("travel"))
return random([
"Where do you want to go?",
"Do you like traveling?",
"Tell me about your trip!"
]);

if(t.includes("movie"))
return random([
"What movie do you like?",
"Why do you like it?",
"Tell me the story!"
]);

if(t.includes("music"))
return random([
"What music do you like?",
"Who is your favorite singer?",
"Why do you like it?"
]);
// giả lập nhớ
if(memory.length > 5)
return "I remember what you said earlier. Can you explain deeper?";

// random
return responses[Math.floor(Math.random()*responses.length)];
}

// ===== UI =====
function add(text,type){
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;
document.getElementById("chat").appendChild(d);
scroll();
}

function loading(){
let d=document.createElement("div");
d.className="msg bot";
d.innerHTML=`<div class="loading">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>`;
document.getElementById("chat").appendChild(d);
scroll();
return d;
}

function scroll(){
let c=document.getElementById("chat");
c.scrollTop=c.scrollHeight;
}

// ===== SEND =====
function send(){
let input=document.getElementById("input");
let text=input.value.trim();
if(!text) return;

add(text,"user");
input.value="";

let load=loading();

setTimeout(()=>{
load.remove();
let res=ai(text);
add(res,"bot");
speak(res);
save();
},600);
}

document.getElementById("input").addEventListener("keypress",e=>{
if(e.key==="Enter") send();
});

// ===== VOICE =====
function voice(){
let rec=new (webkitSpeechRecognition||SpeechRecognition)();
rec.lang="en-US";
rec.onresult=e=>{
document.getElementById("input").value=e.results[0][0].transcript;
};
rec.start();
}

// ===== SPEAK =====
function speak(text){
let u=new SpeechSynthesisUtterance(text);
u.lang="en-US";
speechSynthesis.speak(u);
}

// ===== SAVE =====
function save(){
localStorage.setItem("chat", document.getElementById("chat").innerHTML);
}

// ===== LOAD =====
window.onload = ()=>{
let saved = localStorage.getItem("chat");
if(saved) document.getElementById("chat").innerHTML = saved;
};

</script>

</body>
</html>
