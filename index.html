<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Language Buddy</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#eef2ff;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:#4f46e5;
color:#fff;
padding:15px;
text-align:center;
font-weight:bold;
font-size:18px;
}

#chat{
flex:1;
overflow:auto;
padding:10px;
}

.msg{
max-width:75%;
padding:10px;
margin:6px;
border-radius:15px;
line-height:1.4;
}

.user{
background:#4f46e5;
color:#fff;
margin-left:auto;
}

.bot{
background:#fff;
}

#inputArea{
display:flex;
padding:10px;
background:#fff;
border-top:1px solid #ddd;
}

input{
flex:1;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
margin-left:5px;
padding:10px;
border:none;
border-radius:10px;
background:#4f46e5;
color:#fff;
cursor:pointer;
}

button:hover{
background:#4338ca;
}
</style>
</head>

<body>

<header>🤖 AI Language Buddy</header>

<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="Type your English...">
<button onclick="send()">Send</button>
<button onclick="voice()">🎤</button>
</div>

<script>

// MEMORY
let memory=[];

// RANDOM CHAT RESPONSES
const replies=[
"That's interesting 😊 Tell me more!",
"Nice! 👍 What happened next?",
"Really? Can you explain more?",
"Great! Why do you think that?",
"I see! Keep going 👀"
];

// CORRECTIONS
const corrections=[
["i go yesterday","I went yesterday"],
["she don't","She doesn't"],
["he have","He has"],
["i am go","I am going"],
["i no","I don't"],
["i very","I am very"],
["i want go","I want to go"],
["i have 20 years old","I am 20 years old"]
];

// AI FUNCTION
function ai(text){

let t=text.toLowerCase();
memory.push(t);

// sửa lỗi
for(let c of corrections){
if(t.includes(c[0])){
return "😉 Correction:\n"+c[1]+"\n\n👉 Tell me more!";
}
}

// chat cơ bản
if(t.includes("hello")||t.includes("hi"))
return "Hi 👋 I'm Buddy! Let's practice English!";

if(t.includes("how are you"))
return "I'm great 😄 How about you?";

if(t.includes("your name"))
return "I'm Buddy 🤖 your AI partner!";

// dùng memory
if(memory.length>1){
return random(replies)+"\n(I'm remembering our conversation 😉)";
}

return random(replies);
}

// RANDOM
function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

// SEND MESSAGE
function send(){
let text=input.value.trim();
if(!text) return;

add(text,"user");
input.value="";

let res=ai(text);

setTimeout(()=>{
add(res,"bot");
speak(res);
},400);
}

// UI
function add(text,type){
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

// VOICE INPUT
function voice(){
let rec=new (webkitSpeechRecognition||SpeechRecognition)();
rec.lang="en-US";
rec.onresult=e=>{
input.value=e.results[0][0].transcript;
};
rec.start();
}

// VOICE OUTPUT
function speak(text){
let u=new SpeechSynthesisUtterance(text);
u.lang="en-US";
speechSynthesis.speak(u);
}

</script>

</body>
</html>
