<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Language Buddy</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#343541;
color:#fff;
display:flex;
flex-direction:column;
height:100vh;
}
header{
padding:15px;
text-align:center;
background:#202123;
font-weight:bold;
}
#chat{
flex:1;
overflow:auto;
padding:15px;
}
.msg{
max-width:800px;
margin:auto;
padding:15px;
margin-bottom:10px;
border-radius:8px;
line-height:1.5;
white-space:pre-line;
}
.user{background:#444654;}
.bot{background:#343541;border-bottom:1px solid #555;}

#inputArea{
display:flex;
padding:15px;
background:#40414f;
}
input{
flex:1;
padding:12px;
border-radius:8px;
border:none;
outline:none;
}
button{
margin-left:8px;
padding:10px 15px;
border:none;
border-radius:8px;
background:#10a37f;
color:#fff;
cursor:pointer;
}
button:hover{background:#0e8f6f;}

.loading{display:flex;gap:5px;}
.dot{
width:6px;height:6px;background:#aaa;border-radius:50%;
animation:blink 1.4s infinite;
}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes blink{
0%,80%,100%{opacity:0}
40%{opacity:1}
}
</style>
</head>

<body>

<header>🤖 AI Language Buddy</header>
<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="Type in English..." />
<button onclick="send()">Send</button>
<button onclick="voice()">🎤</button>
</div>

<script>

// ===== MEMORY =====
let memory = [];

// ===== SMART PATTERNS (giống AI thật) =====
const patterns = [
{keys:["hello","hi","hey"],res:["Hi 👋 How are you?","Hello 😄 Tell me about your day!"]},
{keys:["i am","i'm"],res:["Why do you feel that way?","Tell me more 😊"]},
{keys:["i like"],res:["Nice 👍 Why do you like it?","Cool 😎 Tell me more!"]},
{keys:["because"],res:["Good reason 👍 Explain more!"]},
{keys:["i want"],res:["Great goal 💪 How will you do it?"]},
{keys:["i feel"],res:["Why do you feel like that?"]},
];

// ===== CORRECTION =====
function fix(text){
if(text.includes("i go yesterday")) return "😉 Correction: I went yesterday";
if(text.includes("she don't")) return "😉 Correction: She doesn't";
if(text.includes("i very like")) return "😉 Correction: I really like";
if(text.includes("i want go")) return "😉 Correction: I want to go";
return null;
}

// ===== AI =====
function ai(text){
let t = text.toLowerCase();
memory.push(t);

// sửa lỗi
let f = fix(t);
if(f) return f + "\n👉 Try again!";

// pattern
for(let p of patterns){
for(let k of p.keys){
if(t.includes(k)){
return random(p.res);
}
}
}

// context
if(memory.length > 3){
return "Interesting 🤔 Tell me more details!";
}

// fallback
return "👉 Try to write a longer sentence!";
}

// ===== RANDOM =====
function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

// ===== UI =====
function add(text,type){
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;
document.getElementById("chat").appendChild(d);
scroll();
return d;
}

function addLoading(){
let d=document.createElement("div");
d.className="msg bot";
d.innerHTML=`
<div class="loading">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>`;
document.getElementById("chat").appendChild(d);
scroll();
return d;
}

function removeLoading(el){el.remove();}

function scroll(){
let chat=document.getElementById("chat");
chat.scrollTop=chat.scrollHeight;
}

// ===== SEND =====
function send(){
let input=document.getElementById("input");
let text=input.value.trim();
if(!text) return;

add(text,"user");
input.value="";

let load=addLoading();

setTimeout(()=>{
removeLoading(load);
let res=ai(text);
add(res,"bot");
speak(res);
save();
},600);
}

// ENTER
document.getElementById("input").addEventListener("keypress",e=>{
if(e.key==="Enter") send();
});

// ===== VOICE =====
function voice(){
let rec=new (webkitSpeechRecognition||SpeechRecognition)();
rec.lang="en-US";
rec.onresult=e=>{
document.getElementById("input").value=e.results[0][0].transcript;
};
rec.start();
}

// ===== SPEAK =====
function speak(text){
let u=new SpeechSynthesisUtterance(text);
u.lang="en-US";
speechSynthesis.speak(u);
}

// ===== SAVE CHAT =====
function save(){
localStorage.setItem("chat", document.getElementById("chat").innerHTML);
}

// ===== LOAD CHAT =====
window.onload = () => {
let saved = localStorage.getItem("chat");
if(saved) document.getElementById("chat").innerHTML = saved;
};

</script>

<!-- ===== TIDIO (DÁN CODE CỦA BẠN VÀO ĐÂY) ===== -->
<script src="//code.tidio.co/xxxxx.js" async></script>

</body>
</html>
